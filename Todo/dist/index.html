<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TODO App</title>
    <script src="https://unpkg.com/lodash@4.17.20"></script>
  </head>
  <body>
    <script src="./main.js"></script>
    <link rel="stylesheet" href="./css/main.css">
    <div role="presentation">
      <h1>TODO App</h1>
      <div class="flex list-actions">
        <button id="add-list">+ Add new list</button>
        <div class="form-popup">
          <form id="add-list-form" class="hidden form-container">
            <input type="text" placeholder="Enter list name..." name="title" required>

            <div class="actions">
              <button type="submit" id="add-list-save" class="btn">Save</button>
              <button type="button" id='add-list-form-cancel' class="btn cancel">× Cancel</button>
            </div
          </form>
        </div>
      </div>

      <div id="content"></div>
    </div>
  </body>
</html>
