<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TODO App</title>
    <script src="https://unpkg.com/lodash@4.17.20"></script>
  </head>
  <body>
    <script src="./main.js"></script>
    <link rel="stylesheet" href="./css/main.css">
    <div role="presentation">
      <h1>TODO App</h1>
      <button id="add-list">Add new list</button>
      <div class="form-popup glass-box hidden" id="add-list-form">
        <form class="form-container">
          <h2>Add new list</h2>

          <label for="title"><b>List Name</b></label>
          <input type="text" placeholder="Enter list name..." name="title" required>

          <div class="actions">
            <button type="submit" class="btn">Add List</button>
            <button type="button" id='add-list-form-cancel' class="btn cancel">×</button>
          </div
        </form>
      </div>

      <nav id="project-nav">
      </nav>
      <div id="content"></div>
    </div>
  </body>
</html>
