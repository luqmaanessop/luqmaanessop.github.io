<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes"/>
    <title>TODO App</title>
    <script src="https://unpkg.com/lodash@4.17.20"></script>
  </head>
  <body>
    <script src="./main.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
    <div role="presentation">
      <div class="flex list-actions">
        <button type="button" id="destroy">Nuke everything!</button>
        <button id="add-list">+ Add new list</button>
        <button type="button" id="remove-list">- Remove an existing list</button>
        <form id="add-list-form" class="hidden form-container">
          <input type="text" placeholder="Enter list name..." name="title">

          <div class="actions">
            <button type="submit" id="add-list-save" class="btn">Save</button>
            <button type="button" id='add-list-form-cancel' class="btn cancel">× Cancel</button>
          </div
        </form>
      </div>

      <nav><ul id="nav" class="flex menuItems"></ul></nav>
      <div id="content">
        <div class="flex listItem-actions">
          <div id="items-container"></div>
          <button type="button" id="add-list-item">+ Add an Item</button>
          <div id="item-form-popup" class="form-popup hidden">
            <fieldset id="add-listItem-form" class="form-container">
              <h3 id="list-name"></h3>
              <label for="item-title">Item Name:</label>
              <input type="text" id="item-title" placeholder="Enter Item name..." name="item-title">
              <label for="notes">Notes:</label>
              <textarea id="notes" name="notes" rows="6" cols="50" rows="6" cols="50" maxlength="200" placeholder="Notes..."></textarea>
              <label for="date">Due Date:</label>
              <input id="duedate" type="date" name="dueDate">
              <label for="priority">Priority:</label>
              <select id="priority" name="priority" id="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="Urgent">Urgent</option>
              </select>
              <label for="status">Is Complete:</label>
              <label class="switch">
                <input id="status" type="checkbox" name="complete">
                <span class="slider"></span>
              </label>

              <div class="actions">
                <button type="button" id="add-list-item-save" class="btn">Save</button>
                <button type="button" id="add-list-item-update-save" class="btn">Update + Save</button>
                <button type="button" id='add-list-item-form-cancel' class="btn cancel">× Cancel</button>
              </div>
            </fieldset>
          </div>
      </div>
      </div>
    </div>
  </body>
</html>
